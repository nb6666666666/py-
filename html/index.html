<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰红茶 - 清爽一夏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(90deg, #ff6b6b, #ff8e53);
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.3);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.3s;
        }

        nav a:hover {
            transform: translateY(-2px);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 3rem 2rem;
        }

        .hero-section {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 4rem;
            gap: 4rem;
            flex-wrap: wrap;
        }

        .hero-text {
            flex: 1;
            min-width: 300px;
        }

        .hero-text h1 {
            font-size: 3.5rem;
            color: #333;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: #555;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(90deg, #ff6b6b, #ff8e53);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(255, 107, 107, 0.5);
        }

        .hero-image {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
        }

        .hero-image img {
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .features-section {
            max-width: 1200px;
            margin: 0 auto;
        }

        .features-section h2 {
            text-align: center;
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 3rem;
        }

        .features-grid {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .feature-card {
            flex: 1;
            min-width: 250px;
            max-width: 350px;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .feature-card h3 {
            color: #ff6b6b;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .feature-card p {
            color: #666;
            line-height: 1.6;
        }

        footer {
            background: #333;
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .hero-text h1 {
                font-size: 2.5rem;
            }

            nav {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">冰红茶</div>
                <nav>
                    <a href="#home">首页</a>
                    <a href="#features">特色</a>
                    <a href="#about">关于</a>
                    <a href="#contact">联系</a>
                </nav>
            </div>
        </header>

        <main>
            <section class="hero-section">
                <div class="hero-text">
                    <h1>清爽一夏</h1>
                    <p>冰红茶，经典的清凉饮品，精选上等茶叶，配以天然柠檬，带来独特的酸甜口感。每一口都是对夏天的致敬，让您在炎炎夏日中感受清凉与惬意。</p>
                    <a href="#" class="cta-button">立即品尝</a>
                </div>
                <div class="hero-image">
                    <img src="https://images.unsplash.com/photo-1544145945-f90425340c7e?w=500&h=400&fit=crop" alt="冰红茶">
                </div>
            </section>

            <section class="features-section">
                <h2>产品特色</h2>
                <div class="features-grid">
                    <div class="feature-card">
                        <h3>精选原料</h3>
                        <p>采用优质红茶和新鲜柠檬，确保每一杯都能带来纯正的口感和丰富的营养。</p>
                    </div>
                    <div class="feature-card">
                        <h3>清爽口感</h3>
                        <p>独特的配方，酸甜适中，冰爽解渴，是夏日消暑的最佳选择。</p>
                    </div>
                    <div class="feature-card">
                        <h3>健康饮品</h3>
                        <p>富含维生素C和天然抗氧化剂，既美味又健康，让您喝得放心。</p>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; 2024 冰红茶品牌. 保留所有权利.</p>
            </div>
        </footer>
    </div>
</body>
</html>
